# Nginx 主配置文件
# 用于前端静态资源服务 + API 反向代理

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # MIME 类型定义
    include mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 高效文件传输
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 连接超时时间
    keepalive_timeout 65;

    # =====================================
    # Gzip 压缩配置
    # 减少传输数据量，提升加载速度
    # =====================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/woff2
        image/svg+xml
        image/x-icon
        image/jpeg
        image/png
        image/gif;
    gzip_min_length 256;
    gzip_disable "msie6";

    # =====================================
    # HTTP 服务器配置
    # =====================================
    server {
        # 监听 80 端口
        listen 80;
        server_name _;

        # 字符集
        charset utf-8;

        # 根目录设置为前端构建产物目录
        root /usr/share/nginx/html;
        index index.html;

        # =====================================
        # API 请求反向代理到后端服务
        # 所有 /api/ 开头的请求转发到 backend:8080
        # =====================================
        location /api/ {
            # 代理目标地址（docker-compose 中 backend 服务的主机名）
            proxy_pass http://backend:8080/api/;

            # 代理相关请求头设置
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（如需要）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffer_size 4k;
            proxy_buffers 4 32k;
        }

        # =====================================
        # 音频文件请求反向代理到后端服务
        # 所有 /audio/ 开头的请求转发到 backend:8080
        # =====================================
        location /audio/ {
            # 代理目标地址
            proxy_pass http://backend:8080/audio/;

            # 代理相关请求头设置
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 音频文件支持 Range 请求（断点续传/拖动进度）
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # 音频文件较长的超时和缓冲区设置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_max_temp_file_size 0;
        }

        # =====================================
        # 静态资源缓存配置
        # 带 hash 的资源长期缓存
        # =====================================
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
            # 设置 1 年缓存
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;

            # 尝试查找文件，找不到交给 SPA 路由处理
            try_files $uri =404;
        }

        # =====================================
        # SPA 单页应用路由处理
        # 所有其他请求返回 index.html，由前端路由处理
        # =====================================
        location / {
            try_files $uri $uri/ /index.html;

            # HTML 文件不缓存，确保用户获取最新版本
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 禁止访问源映射文件（生产环境）
        location ~ \.map$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
